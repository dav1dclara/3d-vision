# bpa_config.yaml — Ball Pivoting Algorithm reconstruction

ply_path: "Z:/GeoBIM_CAS/01_data_acquisition/02_rtc360/pointcloud_rtc360_raw.ply"
out_path: "Z:/3D_Vision/2_bpa/output/mesh.ply"

voxel_size: 0.030        # resampling spacing [m]; null to skip

estimate_normals: true   # false if the cloud already has oriented normals
normal_max_nn: 16        # kNN for PCA normal estimation
normal_radius: 0.10      # hybrid search radius [m]
orient_normals: true
orient_normals_k: 16

radii: [0.05]            # ball radii [m]; [] to auto-compute from radii_factors
radii_factors: [1.5, 2.5, 5.0]

remove_duplicates: true

color_knn: 1             # nearest neighbours into original cloud
n_threads: -1            # -1 = all cores
