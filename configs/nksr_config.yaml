# nksr_config.yaml — NKSR geometry-aware chunked reconstruction

paths:
  pointcloud_las: "/work/courses/3dv/team13/2026-05-06_17.33.13/3dv_largeScale-registered.las"  # null to use PLY only
  pointcloud_ply: "/work/courses/3dv/team13/2026-05-06_17.33.13/3dv_largeScale-registered.ply"
  output_dir: "/work/courses/3dv/team13/outputs"
  output_mesh: "nksr_reconstruction.ply"

voxel:
  base_size: 0.1           # [m]
  fine_chunk_size: 0.25    # segmentation cell size [m]

planarity:
  residual_threshold: 0.1       # below this = planar
  angle_threshold_deg: 15.0     # max normal angle to merge planar chunks [deg]
  coplanar_dist_threshold: 0.1  # max point-to-plane distance to merge [m]
  min_points_per_chunk: 20

reconstruction:
  complex_detail_level: 1
  complex_mise_iter: 1
  complex_voxel_factor: 0.15    # × base_size
  complex_max_extent_m: 2.0
  complex_max_pts: 1_000_000

  planar_very_flat_threshold: 0.02   # residual below this = very flat
  planar_very_flat_detail: 0.3
  planar_very_flat_mise_iter: 1
  planar_very_flat_voxel_factor: 2   # × base_size

  planar_flat_detail: 0.5
  planar_flat_mise_iter: 1
  planar_flat_voxel_factor: 1.5      # × base_size
  planar_overlap_m: 0.3

subsampling:
  planar_max_pts: 300_000

misc:
  min_pts_per_unit: 200
  gpu_device: "cuda:0"
