# vdbfusion_config.yaml — VDBFusion TSDF reconstruction

input:
  las_path: "/work/scratch/vpacheco/2026-03-09_16.19.44/pointcloud.las"

fusion:
  voxel_size: 0.04
  sdf_trunc: 0.05
  space_carving: false
  fill_holes: true
  min_weight: 0.8

preprocess:
  downsample_voxel_size: 0.0   # 0 = no downsampling

static_mode:
  fixed_origin: [0.0, 0.0, 2.0]

output:
  output_dir: "../outputs/"
  map_name: "vdbfusion_reconstruction"

sweep:
  enabled: true
  output_subdir: "sweeps"
  min_weight_values: [0.0, 0.5, 0.8]
  downsample_voxel_sizes: [0.0, 0.01]
  sdf_trunc_values: [0.025, 0.05]
  voxel_size_values: [0.01, 0.02, 0.04]
